name: Deploy Backend to DigitalOcean

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      - 'nest-cli.json'
      - 'Dockerfile'
      - 'docker-compose.yml'
      - '.dockerignore'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:  # Allow manual trigger

env:
  NODE_VERSION: '20.x'

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies (for validation)
        run: |
          npm ci
          echo "✅ Dependencies installed successfully"

      - name: Build application (validation)
        run: |
          npm run build
          echo "✅ Build successful"

      - name: Cleanup Docker resources on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: 22
          timeout: 300s
          script: |
            set -e
            
            echo "🧹 Pre-deployment cleanup..."
            echo "======================================"
            
            # Show disk space before cleanup
            echo "💾 Disk space BEFORE cleanup:"
            df -h / | grep -E '(Filesystem|/$)'
            echo ""
            
            APP_DIR="/var/www/sports-platform-api"
            cd $APP_DIR
            
            # Stop containers
            echo "🛑 Stopping containers..."
            docker-compose down || true
            
            # Clean old Docker resources
            echo "🧹 Cleaning Docker resources..."
            
            # Remove old images (keep last 2 builds)
            echo "  - Removing old images..."
            docker images | grep sports-platform-api | tail -n +3 | awk '{print $3}' | xargs -r docker rmi -f 2>/dev/null || true
            
            # Clean dangling images
            echo "  - Removing dangling images..."
            docker image prune -f || true
            
            # Clean build cache older than 24 hours
            echo "  - Cleaning build cache..."
            docker builder prune -af --filter "until=24h" || true
            
            # Clean npm cache
            echo "  - Cleaning npm cache..."
            npm cache clean --force 2>/dev/null || true
            
            # Truncate Docker logs
            echo "  - Truncating Docker logs..."
            truncate -s 0 /var/lib/docker/containers/*/*-json.log 2>/dev/null || true
            
            # Show disk space after cleanup
            echo ""
            echo "💾 Disk space AFTER cleanup:"
            df -h / | grep -E '(Filesystem|/$)'
            
            # Check if we have enough space
            DISK_USAGE=$(df / | tail -1 | awk '{print $5}' | sed 's/%//')
            if [ $DISK_USAGE -gt 85 ]; then
              echo "⚠️  WARNING: Disk usage is ${DISK_USAGE}% (>85%). Deployment may fail!"
              echo "Consider upgrading server or cleaning more aggressively."
            else
              echo "✅ Disk space OK (${DISK_USAGE}% used)"
            fi
            echo ""

      - name: Deploy to DigitalOcean with Docker
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: 22
          timeout: 600s
          script: |
            set -e
            
            echo "🐳 Starting Docker deployment to DigitalOcean..."
            echo "📅 Deployment time: $(date)"
            echo "🔄 Branch: main"
            echo "📍 Server: $(hostname)"
            
            APP_DIR="/var/www/sports-platform-api"
            cd $APP_DIR
            
            # Check if directory exists
            if [ ! -d "$APP_DIR" ]; then
              echo "❌ Error: Application directory not found!"
              exit 1
            fi
            
            # Check Docker
            echo "🐳 Checking Docker..."
            if ! command -v docker &> /dev/null; then
              echo "❌ Docker is not installed!"
              exit 1
            fi
            docker --version
            docker-compose --version
            
            # Pull latest changes
            echo "📥 Pulling latest changes from GitHub..."
            git fetch origin main
            
            # Handle any local changes (stash or discard)
            if ! git diff-index --quiet HEAD --; then
              echo "⚠️  Local changes detected, stashing them..."
              git stash save "CI/CD: Stashing local changes before deployment $(date +%Y%m%d-%H%M%S)" || true
            fi
            
            git checkout main
            git reset --hard origin/main
            
            # Show commit info
            echo "📝 Latest commit:"
            git log -1 --oneline
            
            # Stop existing container if running (already done in cleanup, but being safe)
            echo "🛑 Stopping existing container..."
            docker-compose down || true
            
            # Build and start new container
            echo "🔨 Building Docker image..."
            docker-compose build --no-cache
            
            echo "🚀 Starting container..."
            docker-compose up -d
            
            # Wait for container to start
            echo "⏳ Waiting for container to be ready..."
            sleep 10
            
            # Check container status
            echo "📊 Container Status:"
            docker-compose ps
            
            # Wait for health check
            echo "🏥 Waiting for health check..."
            MAX_ATTEMPTS=30
            ATTEMPT=0
            HEALTHY=false
            
            while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
              HEALTH_CHECK=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:5000/api/v1/health || echo "000")
              if [ "$HEALTH_CHECK" = "200" ]; then
                HEALTHY=true
                break
              fi
              ATTEMPT=$((ATTEMPT + 1))
              echo "  Attempt $ATTEMPT/$MAX_ATTEMPTS: HTTP $HEALTH_CHECK (waiting...)"
              sleep 2
            done
            
            if [ "$HEALTHY" = true ]; then
              echo "✅ Health check passed (HTTP 200)"
              echo "✅ Deployment successful!"
              
              # Show container logs
              echo "📋 Container logs (last 20 lines):"
              docker-compose logs --tail=20
            else
              echo "❌ Health check failed after $MAX_ATTEMPTS attempts"
              echo "📋 Container logs:"
              docker-compose logs --tail=50
              echo "📋 Container status:"
              docker-compose ps
              exit 1
            fi
            
            echo ""
            echo "🎉 Docker deployment completed successfully!"
            echo "🌐 API: https://api.scorenews.net/api/v1"
            echo "📊 Health: https://api.scorenews.net/api/v1/health"

      - name: Deployment Summary
        if: success()
        run: |
          echo "✅ Deployment completed successfully!"
          echo "🌐 Production URL: https://api.scorenews.net/api/v1"
          echo "📊 Health Check: https://api.scorenews.net/api/v1/health"

      - name: Deployment Failed
        if: failure()
        run: |
          echo "❌ Deployment failed!"
          echo "Please check the logs above for details."

